<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FR neon code favicon">
  <defs>
    <linearGradient id="neonStroke" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="#020617"/>
  <rect x="6" y="6" width="52" height="52" rx="12" fill="none" stroke="url(#neonStroke)" stroke-width="2"/>

  <g fill="none" stroke="url(#neonStroke)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M23 22 L15 32 L23 42"/>
    <path d="M29 45 L35 19"/>
    <path d="M41 22 L49 32 L41 42"/>
  </g>
</svg>
